name: Bug report
description: Report incorrect highlights, behavior, or compatibility
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem. Please reproduce it with the smallest practical configuration.
  - type: input
    id: neovim-version
    attributes:
      label: Neovim version
      description: Paste the first line of `nvim --version`.
      placeholder: NVIM v0.12.0
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - gruber-muted
        - gruber-darker
        - custom
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: Minimal configuration
      description: Include Neotheme setup and any relevant integration setup.
      render: lua
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, logs, terminal details, or plugin versions when relevant.
