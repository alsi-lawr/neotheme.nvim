name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Check formatting
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  test:
    name: Neovim ${{ matrix.neovim }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: ${{ matrix.neovim == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        neovim:
          - v0.12.0
          - stable
          - nightly
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - name: Run tests
        run: ./tests/run.sh
