<svg xmlns="http://www.w3.org/2000/svg" width="928" height="704" viewBox="0 0 928 704" role="img" aria-labelledby="title description">
	<title id="title">Typewriter Ribbon simplified palette</title>
	<desc id="description">24 configured colors from the shared simplified palette.</desc>
